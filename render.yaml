services:
  - type: web
    name: synup-sdk-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd examples/fullstack && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SYNUP_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
